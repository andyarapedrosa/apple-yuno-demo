<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apple / iPlace × Yuno — Checkout Demo (SDK Lite)</title>
<style>
  :root{
    /* iPlace (BR) */
    --lime:#C3D82E; --ip-blue:#2E5CE6; --ip-blue-h:#2749c9; --sel-bg:#EEF1FC; --logo-lime:#A4C400;
    /* Apple (MX/CL) */
    --ap-blue:#0071E3; --ap-blue-h:#0064c9; --ap-ink:#1d1d1f; --ap-nav:#f5f5f7; --ap-line:#d2d2d7;
    /* shared */
    --panel:#F5F5F5; --green:#1F9D3A; --ink:#1A1A1A; --muted:#6B7280; --line:#E5E7EB;
    --font-ip:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    --font-ap:'SF Pro Text','SF Pro Display',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow-x:hidden}
  body{font-family:var(--font-ip);color:var(--ink);background:#fff;line-height:1.4;-webkit-font-smoothing:antialiased}
  a{color:var(--ip-blue);text-decoration:none}
  button{cursor:pointer;font-family:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  /* country switcher (demo control) */
  .ctabs{background:#0b0d16;border-bottom:1px solid #1c2030}
  .ctabs .wrap{display:flex;gap:6px;align-items:center}
  .ctabs .lbl{color:#7b8196;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-right:8px;padding:12px 0}
  .ctab{border:0;background:transparent;padding:12px 16px;font-size:13px;font-weight:600;color:#9aa1b8;border-bottom:3px solid transparent;display:flex;gap:8px;align-items:center}
  .ctab.on{color:#fff;border-bottom-color:#8b93ff}
  .ctab .skin{font-size:10px;opacity:.6}

  /* ===== iPlace skin ===== */
  .ip .promo{background:var(--lime);text-align:center;padding:11px;font-size:14px}
  .ip .promo a{color:#1a1a1a;text-decoration:underline;font-weight:500}
  .ip .hdr{border-bottom:1px solid var(--line)}
  .ip .hdr .wrap{display:flex;align-items:center;gap:14px;padding:16px 24px}
  .ip .logo{display:flex;align-items:center;font-weight:800;font-size:24px;letter-spacing:-.5px}
  .ip .logo .ring{width:34px;height:34px;border-radius:50%;border:3px solid var(--logo-lime);display:flex;align-items:center;justify-content:center;font-size:22px;margin-right:3px}
  .ip .partner{border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:11px;font-weight:600;color:#1a1a1a;line-height:1.05;display:inline-flex;gap:7px;align-items:center}
  .ip .partner .apple{font-size:17px;line-height:1}
  .ip .partner .pp{text-align:left;line-height:1.05}
  .ip .bag{margin-left:auto;width:26px;height:26px;color:var(--ip-blue)}

  /* ===== Apple skin ===== */
  .ap{font-family:var(--font-ap);color:var(--ap-ink)}
  .ap .apnav{background:rgba(250,250,252,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--ap-line)}
  .ap .apnav .wrap{display:flex;align-items:center;gap:26px;height:44px;font-size:12px;color:#333}
  .ap .apnav .apple{font-size:15px}
  .ap .apnav a{color:#1d1d1fcc;font-weight:400}
  .ap .apnav a:hover{color:#1d1d1f}
  .ap .apnav .sp{margin-left:auto}
  .ap .payhead{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--ap-line);padding:24px 0}
  .ap .payhead h2{font-size:24px;font-weight:600}
  .ap .payhead a{font-size:15px;color:var(--ap-blue)}

  /* checkout layout (both skins) */
  .checkout{display:grid;grid-template-columns:minmax(0,1fr) 420px;gap:0;align-items:start}
  @media (max-width:1000px){.checkout{grid-template-columns:1fr}}
  .left{padding:34px 44px 60px 0}
  @media (max-width:1000px){.left{padding:26px 0}}
  .right{background:var(--panel);padding:34px 0 60px 38px}
  .ap .right{background:#fff;border-left:1px solid var(--ap-line)}
  @media (max-width:1000px){.right{padding:24px 0;margin-top:8px}}
  .right-inner{max-width:360px}

  h1.big{font-size:40px;font-weight:600;letter-spacing:-.02em;line-height:1.08;margin-bottom:26px}
  .ip h1.big{font-size:26px;font-weight:700}

  /* iPlace methods */
  .methods{border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .method{border-bottom:1px solid var(--line)}
  .method:last-child{border-bottom:0}
  .method .head{display:flex;align-items:center;gap:12px;padding:18px 20px;cursor:pointer}
  .method.sel{background:#fff;box-shadow:inset 3px 0 0 var(--ip-blue), inset 0 0 0 1px rgba(46,92,230,.45)}
  .method.sel .head{background:var(--sel-bg)}
  .method.sel .m-body{background:#fff}
  .radio{width:20px;height:20px;border-radius:50%;border:2px solid #c4c8cf;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .method.sel .radio{border-color:var(--ip-blue)}
  .method.sel .radio::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--ip-blue)}
  .m-name{font-weight:600;font-size:16px}
  .m-sub{font-size:13px;color:var(--green);font-weight:600}
  .m-body{display:none;padding:0 20px 22px}
  .method.sel .m-body{display:block}

  /* fields */
  .field{width:100%;border:1px solid #d5d9e0;border-radius:10px;padding:15px 14px;font-size:15px;margin-bottom:12px;background:#fff;color:var(--ink);font-family:inherit}
  .field::placeholder{color:#9aa0aa}
  .field.hl{background:#fffdf0;border-color:#e9e2a8}
  .field.selb{background:var(--sel-bg);border-color:#cdd6f7}
  .frow{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:center}
  .card-illus{width:56px;height:38px;border-radius:6px;background:#eceef2;display:flex;align-items:center;justify-content:center;font-size:9px;color:#777;font-family:monospace}
  .form-h{font-weight:700;font-size:16px;margin:4px 0 12px}
  .savecard{display:flex;align-items:center;gap:10px;font-size:14px;color:#333;margin:4px 0 16px}
  .visa{font-weight:800;font-style:italic;color:#1a1f71;font-size:15px}

  /* Apple payment blocks */
  .ap .sec-h{font-size:19px;font-weight:600;margin:30px 0 14px}
  .ap .sec-h .fin{font-size:14px;color:var(--ap-blue);font-weight:400;margin-left:10px}
  .ap-box{border:1px solid var(--ap-line);border-radius:12px;padding:18px 20px;margin-bottom:14px;cursor:pointer}
  .ap-box.on{border-color:var(--ap-blue);box-shadow:0 0 0 1px var(--ap-blue)}
  .ap-box .t{font-weight:600;font-size:16px}
  .ap-box .s{font-size:13px;color:var(--muted);margin-top:2px}
  .ap-lbl{font-size:15px;color:#333;margin:16px 0 8px}
  .ap-cardrow{display:grid;grid-template-columns:1fr 165px;gap:12px}
  .ap-check{display:flex;align-items:center;gap:10px;font-size:15px;margin:8px 0 12px}
  .ap-addr{font-size:14px;color:#333;line-height:1.6;white-space:pre-line}
  .ap-cta{background:var(--ap-blue);color:#fff;border:0;border-radius:12px;padding:15px 34px;font-size:17px;font-weight:500}
  .ap-cta:hover{background:var(--ap-blue-h)}
  .ap-cta.full{width:100%}

  /* CTA iPlace */
  .cta{width:100%;background:var(--ip-blue);color:#fff;border:0;border-radius:8px;padding:16px;font-size:16px;font-weight:600;letter-spacing:.2px;text-decoration:none}
  .cta:hover{background:var(--ip-blue-h)}

  /* order summary */
  .sum-row{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #e8e8e8}
  .ap .sum-row{border-color:var(--ap-line)}
  .sum-thumb{width:60px;height:60px;border-radius:10px;background:#fff;border:1px solid var(--line);position:relative;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:28px}
  .sum-thumb .qty{position:absolute;top:-8px;left:-8px;width:22px;height:22px;border-radius:50%;background:#4b4b4b;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:600}
  .sum-info{flex:1;min-width:0}
  .sum-info .t{font-weight:600;font-size:15px}
  .sum-info .d{font-size:12.5px;color:var(--muted);line-height:1.5}
  .sum-info .d b{color:#333}
  .sum-price{font-weight:600;font-size:15px;white-space:nowrap}
  .coupon{display:flex;gap:10px;margin:16px 0}
  .coupon input{flex:1;border:1px solid #d5d9e0;border-radius:10px;padding:13px 14px;font-size:14px}
  .coupon button{border:0;background:#e6e7ea;color:#555;border-radius:10px;padding:0 22px;font-weight:600}
  .totals .r{display:flex;justify-content:space-between;padding:7px 0;font-size:15px;color:#333}
  .totals .grand{display:flex;justify-content:space-between;padding:14px 0 0;font-size:22px;font-weight:800;border-top:1px solid #e8e8e8;margin-top:6px}
  .iva{font-size:12px;color:var(--muted);text-align:right;margin-top:4px}
  .tradein{margin-top:18px;padding-top:16px;border-top:1px solid var(--ap-line);font-size:13px;color:#444;line-height:1.6}
  .tradein b{display:block;font-size:15px;color:var(--ap-ink);margin-bottom:6px}

  /* overlays (shared) */
  .ov{position:fixed;inset:0;background:rgba(20,22,30,.55);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .ov.show{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:420px;width:92%;padding:34px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.35)}
  .spin{width:54px;height:54px;border:5px solid #e5e8f5;border-top-color:var(--ip-blue);border-radius:50%;margin:6px auto 18px;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .m-t{font-size:20px;font-weight:700;margin-bottom:6px}
  .m-p{color:var(--muted);font-size:14px}
  .issuer{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;color:#1a1f71;margin-bottom:14px;font-size:15px}
  .otp{display:flex;gap:8px;justify-content:center;margin:18px 0}
  .otp input{width:42px;height:52px;text-align:center;font-size:22px;border:1px solid #d5d9e0;border-radius:10px}
  .success-ic{width:66px;height:66px;border-radius:50%;background:#e7f6ec;color:var(--green);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px}
  .m-btn{margin-top:20px;background:var(--ip-blue);color:#fff;border:0;border-radius:999px;padding:14px 30px;font-weight:700;font-size:15px}

  /* Yuno sections */
  .yuno-sec{padding:70px 0}
  .yuno-sec.dark{background:#0b0d16;color:#fff}
  .yuno-sec.light{background:#f7f8fb}
  .eyebrow{text-align:center;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ip-blue)}
  .dark .eyebrow{color:#8b93ff}
  .yuno-h{text-align:center;font-size:clamp(24px,3.2vw,34px);font-weight:300;letter-spacing:-.02em;margin:12px 0 6px}
  .yuno-h b{font-weight:700}
  .yuno-sub{text-align:center;color:var(--muted);max-width:60ch;margin:0 auto 40px;font-size:15px}
  .dark .yuno-sub{color:#9aa1b8}
  .cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}
  @media (max-width:980px){.cards{grid-template-columns:1fr 1fr}}
  @media (max-width:560px){.cards{grid-template-columns:1fr}}
  .rec{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 10px 30px rgba(20,22,40,.05)}
  .rec .ic{width:44px;height:44px;border-radius:11px;background:var(--sel-bg);color:var(--ip-blue);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
  .rec h3{font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.25}
  .rec p{font-size:13.5px;color:#4a5060;line-height:1.55}
  .rec a{display:inline-block;margin-top:12px;font-size:12.5px;font-weight:600}
  .steps{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
  .stp{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start;border:1px solid #262a3d;background:#141726;border-radius:14px;padding:20px 22px}
  .stp .n{width:34px;height:34px;border-radius:10px;background:#2a2f45;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center}
  .stp h4{font-size:16px;font-weight:700;margin-bottom:4px}
  .stp .layer{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:999px;display:inline-block;margin-bottom:8px}
  .L-front{background:rgba(70,199,214,.16);color:#46c7d6}.L-sdk{background:rgba(90,120,255,.16);color:#7b8cff}
  .L-back{background:rgba(240,180,60,.16);color:#f0b43c}.L-yuno{background:rgba(60,200,120,.16);color:#3cc878}
  .stp p{font-size:13.5px;color:#9aa1b8;line-height:1.55}
  .stp code{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#ffd28a}
  .stp pre{background:#0a0c14;border:1px solid #262a3d;border-radius:10px;padding:12px 14px;margin-top:10px;overflow:auto;font-size:12px;color:#cdd3e6;line-height:1.6}
  footer{padding:26px 0 46px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;line-height:1.6}
  .badge-y{display:inline-flex;align-items:center;gap:8px;background:#141726;color:#fff;border-radius:999px;padding:8px 16px;font-size:12px;font-weight:600;position:fixed;bottom:18px;right:18px;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.3)}
  .badge-y b{color:#8b93ff}

  /* Apple single-column checkout + slide-over summary drawer */
  .ap-checkout{max-width:660px;padding:8px 0 70px}
  .drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .25s;z-index:90}
  .drawer-bg.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:430px;max-width:92%;background:#fff;box-shadow:-12px 0 44px rgba(0,0,0,.16);transform:translateX(100%);transition:transform .28s ease;z-index:91;padding:28px 30px 46px;overflow:auto}
  .drawer.show{transform:none}
  .drawer .x{position:absolute;top:20px;right:20px;width:34px;height:34px;border-radius:50%;background:#e8e8ed;border:0;font-size:15px;color:#333}
  .drawer h3{font-size:22px;font-weight:600;margin:2px 0 4px}
  .drawer h4{font-size:20px;font-weight:600;margin:26px 0 2px}
  .drawer .hr{border-top:1px solid var(--ap-line);margin:16px 0}
  .drawer .row{display:flex;justify-content:space-between;font-size:15px;padding:6px 0;color:#333}
  .drawer .row a,.drawer .det .h a{color:var(--ap-blue)}
  .drawer .tot{display:flex;justify-content:space-between;font-size:18px;font-weight:600;padding-top:2px}
  .drawer .dvat{font-size:12px;color:var(--muted);text-align:right;margin-top:2px}
  .drawer .det{padding:14px 0;border-bottom:1px solid var(--ap-line)}
  .drawer .det .h{display:flex;justify-content:space-between;font-weight:600;font-size:15px}
  .drawer .det .h a{font-weight:400}
  .drawer .det .v{font-size:15px;color:#333;margin-top:5px}

  /* card-field details */
  .cc-wrap{position:relative}
  .cc-wrap .field{padding-right:60px}
  .cc-badge{position:absolute;right:14px;top:16px}
  select.field{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%23777' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:34px}
  .ap-cvvwrap{display:flex;align-items:center;gap:10px}
  .ap-cvvwrap .field{margin-bottom:0}
  .ap-help{width:22px;height:22px;border-radius:50%;background:#6e6e73;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
</style>
</head>
<body>

<!-- demo country switcher -->
<div class="ctabs"><div class="wrap">
  <span class="lbl">Demo · country</span>
  <button class="ctab on" data-c="BR" onclick="setCountry('BR')">🇧🇷 Brazil <span class="skin">· iPlace</span></button>
  <button class="ctab" data-c="MX" onclick="setCountry('MX')">🇲🇽 Mexico <span class="skin">· Apple</span></button>
</div></div>

<!-- app chrome + checkout (rendered by JS) -->
<div id="app"></div>

<footer><div class="wrap">Presales demo · Yuno SDK Lite · not a real payment flow.</div></footer>
<div class="badge-y">Powered by <b>yuno</b> · SDK Lite</div>

<!-- overlays -->
<div class="ov" id="ov-proc"><div class="modal"><div class="spin"></div><div class="m-t" id="proc-t">Processando…</div><div class="m-p" id="proc-p"></div></div></div>
<div class="ov" id="ov-3ds"><div class="modal">
  <div class="issuer"><span class="visa">VISA</span> · 3DS</div>
  <div class="m-t" id="d3-t">Verificação 3DS</div><div class="m-p" id="d3-p"></div>
  <div class="otp"><input maxlength="1" value="1"><input maxlength="1" value="2"><input maxlength="1" value="3"><input maxlength="1" value="4"><input maxlength="1" value="5"><input maxlength="1" value="6"></div>
  <button class="m-btn" onclick="finish3ds()" id="d3-btn">Confirmar</button>
</div></div>
<div class="ov" id="ov-pix"><div class="modal">
  <div class="m-t" id="px-t"></div><div class="m-p" id="px-p"></div>
  <div style="width:170px;height:170px;margin:14px auto;border-radius:8px;background:repeating-conic-gradient(#111 0 25%,#fff 0 50%) 0 0/20px 20px"></div>
  <div style="font-weight:700;color:var(--ip-blue)" id="px-count">04:59</div>
  <button class="m-btn" onclick="pixPaid()" id="px-btn"></button>
</div></div>
<div class="ov" id="ov-ok"><div class="modal">
  <div class="success-ic">✓</div><div class="m-t" id="ok-t"></div><div class="m-p" id="ok-p"></div>
  <button class="m-btn" onclick="resetDemo()" id="ok-btn"></button>
</div></div>

let C='BR', selected=null;
const $=id=>document.getElementById(id);
function esc(s){return s;}

function setCountry(c){
  C=c; selected=null;
  document.querySelectorAll('.ctab').forEach(b=>b.classList.toggle('on',b.dataset.c===c));
  const cfg=CFG[c]; document.documentElement.lang=cfg.lang==='pt'?'pt-BR':'es';
  $('app').className = cfg.skin==='iplace'?'ip':'ap';
  $('app').innerHTML = cfg.skin==='iplace'? renderIplace(cfg) : renderApple(cfg);
}

/* ---------- iPlace skin ---------- */
function renderIplace(cfg){
  const L=cfg.L;
  return `
  <div class="promo"><a href="#">Confira acessórios para iPad</a></div>
  <header class="hdr"><div class="wrap">
    <img src="iplace-logo.png" alt="iPlace" style="height:74px;width:auto;display:block;margin:-12px -10px">
    <img src="premium-partner.png" alt="Apple Premium Partner" style="height:56px;width:auto;display:block">
    <svg class="bag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 8h12l-1 12H7L6 8Z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>
  </div></header>
  <div class="wrap"><div class="checkout">
    <div class="left">
      <h1 class="big">${L.pay}</h1>
      <div style="color:var(--muted);font-size:14px;margin:-18px 0 22px">${L.secure}</div>
      <div class="methods">${cfg.methods.map(m=>ipMethod(cfg,m)).join('')}</div>
    </div>
    <div class="right"><div class="right-inner">
      ${sumRows(cfg)}
      <div class="coupon"><input placeholder="${L.couponPh}"><button>${L.apply}</button></div>
      <div class="totals">
        <div class="r"><span>${L.sub}</span><span>${cfg.product.price}</span></div>
        <div class="r"><span>${L.disc}</span><span>R$ 0,00</span></div>
        <div class="r"><span>${L.ship}</span><span>${L.shipV}</span></div>
        <div class="grand"><span>${L.total}</span><span>${cfg.total}</span></div>
      </div>
    </div></div>
  </div></div>`;
}
function ipMethod(cfg,m){
  const L=cfg.L; return `
  <div class="method" data-id="${m.id}">
    <div class="head" onclick="pick('${m.id}')"><span class="radio"></span>
      <div><div class="m-name">${m.name}</div>${m.sub?`<div class="m-sub">${m.sub}</div>`:''}</div></div>
    <div class="m-body">${ipBody(cfg,m)}</div>
  </div>`;
}
function ipBody(cfg,m){
  const L=cfg.L;
  if(m.kind==='card') return `
    <div class="form-h">${L.cardH}</div>
    <div class="cc-wrap"><input class="field" placeholder="${L.ccnum}" value="4111 1111 1111 1111"><span class="visa cc-badge">VISA</span></div>
    <input class="field" placeholder="${L.ccname}">
    <input class="field" placeholder="${L.ccdoc}">
    <div class="frow">
      <select class="field selb"><option>${L.mm}</option><option selected>Março</option></select>
      <select class="field selb"><option>${L.yy}</option><option selected>2030</option></select>
      <input class="field" placeholder="${L.cvv}" value="123">
      <div class="card-illus">010101 <span style="color:#c00;border:1px solid #c00;border-radius:2px;padding:0 2px">123</span></div>
    </div>
    <select class="field"><option>1x ${cfg.total}</option><option>6x</option><option>12x</option></select>
    <label class="savecard"><input type="checkbox"> ${L.save}</label>
    <button class="cta" onclick="pay('CARD')">${L.finalize}</button>`;
  if(m.kind==='pix') return `
    <div style="font-weight:700;font-size:15px;margin-bottom:10px">No método de pagamento via Pix, você pode pagar escaneando o QR Code ou Copiando e Colando o código.</div>
    <div style="color:var(--ip-blue);font-weight:700">O código Pix e QR Code têm validade de 30 minutos.</div>
    <div style="color:var(--muted);font-size:14px;margin:4px 0 14px">Se você não conseguir pagar até o prazo, o pedido será cancelado.</div>
    <div style="font-weight:800;font-size:20px;margin-bottom:14px">${cfg.total} <span style="font-weight:500;font-size:14px;color:var(--muted)">pagamento à vista</span></div>
    <button class="cta" onclick="pay('PIX')">${L.finalize}</button>`;
  if(m.kind==='split') return `
    <div style="color:var(--muted);font-size:14px;margin-bottom:10px">Divida o valor entre os métodos escolhidos.</div>
    <input class="field" placeholder="Qual valor deseja pagar com o Cartão de crédito?">
    <button class="cta" onclick="pay('CARD')">${L.finalize}</button>`;
  if(m.kind==='voucher') return `
    <input class="field" placeholder="Insira o código do Cartão Presente">
    <button class="cta" onclick="pay('VOUCHER')">${L.finalize}</button>`;
  return '';
}

    <h4>Detalles de tu pedido</h4>
    <div class="det"><div class="h"><span>Entrega en:</span><a href="#">Cambiar</a></div><div class="v">Lun 13 Jul</div></div>
    <div class="det"><div class="h"><span>Entregar a:</span><a href="#">Cambiar</a></div><div class="v">Av. Augusto de Lima</div></div>
    <div class="det"><div class="h"><span>Pago</span></div></div>
    <div class="det" style="border-bottom:0"><div class="h"><span>Revisión</span><a href="#">Ver</a></div></div>
  </aside>`;

function sumRows(cfg){
  return `
  <div class="sum-row">
    <div class="sum-thumb"><span class="qty">1</span>📱</div>
    <div class="sum-info"><div class="t">${cfg.product.name}</div><div class="d">${cfg.product.desc}</div></div>
    <div class="sum-price">${cfg.product.price}</div>
  </div>
  <div class="sum-row">
    <div class="sum-thumb"><span class="qty">1</span>↻</div>
    <div class="sum-info"><div class="t">${cfg.tradein.title}</div><div class="d">${cfg.tradein.desc}</div></div>
  </div>`;
}

/* ---------- interactions ---------- */
function pick(id){ selected=id; document.querySelectorAll('.method').forEach(el=>el.classList.toggle('sel',el.dataset.id===id)); }
function openSummary(){ $('drawer').classList.add('show'); $('drawerBg').classList.add('show'); }
function closeSummary(){ $('drawer').classList.remove('show'); $('drawerBg').classList.remove('show'); }

function show(id){$(id).classList.add('show')} function hide(id){$(id).classList.remove('show')}
function hideAll(){['ov-proc','ov-3ds','ov-pix','ov-ok'].forEach(hide)}
let pixTimer=null;
function pay(method){
  const L=CFG[C].L;
  $('proc-t').textContent=L.proc; $('proc-p').textContent=L.procS; show('ov-proc');
  setTimeout(()=>{ hide('ov-proc');
    if(method==='CARD'){ $('d3-t').textContent=L.d3; $('d3-p').textContent=L.d3s; $('d3-btn').textContent=L.d3b; show('ov-3ds'); }
    else if(method==='PIX'){ $('px-t').textContent=L.pxt; $('px-p').textContent=L.pxp; $('px-btn').textContent=L.pxb; pixCountdown(); show('ov-pix'); }
    else success();
  },1200);
}
function finish3ds(){ hide('ov-3ds'); const L=CFG[C].L; $('proc-t').textContent=L.proc; $('proc-p').textContent='3DS ✓'; show('ov-proc'); setTimeout(()=>{hide('ov-proc');success();},900); }
function pixCountdown(){ let s=299; clearInterval(pixTimer); pixTimer=setInterval(()=>{s--;$('px-count').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;if(s<=0)clearInterval(pixTimer);},1000); }
function pixPaid(){ clearInterval(pixTimer); hide('ov-pix'); success(); }
function success(){ const L=CFG[C].L; $('ok-t').textContent=L.okt; $('ok-p').textContent=L.okp; $('ok-btn').textContent=L.okb; show('ov-ok'); }
function resetDemo(){ hideAll(); selected=null; window.scrollTo({top:0,behavior:'smooth'}); }

setCountry('BR');
</script>
