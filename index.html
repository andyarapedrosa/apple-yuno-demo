<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apple × Yuno — Checkout Demo (SDK Lite)</title>
<style>
  :root{
    --blue:#0071E3; --blue-h:#0064c9; --ink:#1d1d1f; --muted:#6e6e73;
    --line:#d2d2d7; --nav:#f5f5f7; --green:#1f9d3a;
    --font:'SF Pro Text','SF Pro Display',-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI',Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overflow-x:hidden}
  body{font-family:var(--font);color:var(--ink);background:#fff;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:var(--blue);text-decoration:none}
  button{cursor:pointer;font-family:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  .ctabs{background:#0b0d16;border-bottom:1px solid #1c2030}
  .ctabs .wrap{display:flex;gap:6px;align-items:center}
  .ctabs .lbl{color:#7b8196;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-right:8px;padding:12px 0}
  .ctab{border:0;background:transparent;padding:12px 16px;font-size:13px;font-weight:600;color:#9aa1b8;border-bottom:3px solid transparent}
  .ctab.on{color:#fff;border-bottom-color:#8b93ff}

  .apnav{background:rgba(250,250,252,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40}
  .apnav .wrap{display:flex;align-items:center;gap:26px;height:44px;font-size:12px}
  .apnav .apple{font-size:15px}
  .apnav a{color:#1d1d1fcc;font-weight:400}
  .apnav a:hover{color:#1d1d1f}
  .apnav .sp{margin-left:auto}

  .payhead{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding:22px 0}
  .payhead h2{font-size:24px;font-weight:600}
  .payhead a{font-size:15px}

  .checkout{max-width:980px;padding:6px 0 20px}
  .leftcol{max-width:540px}
  h1.big{font-size:40px;font-weight:600;letter-spacing:-.02em;line-height:1.08;margin:34px 0 30px}
  .sec-h{font-size:19px;font-weight:600;margin:34px 0 14px}

  /* method row: box (left ~540) + contextual note (right) */
  .m-row{display:grid;grid-template-columns:minmax(0,540px) minmax(0,1fr);gap:40px;align-items:start;margin-bottom:12px}
  .m-left{min-width:0}
  .ap-box{border:1px solid var(--line);border-radius:12px;padding:18px 20px;cursor:pointer;transition:box-shadow .12s,border-color .12s}
  .ap-box.on{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
  .ap-box .t{font-weight:600;font-size:16px}
  .ap-box .s{font-size:13px;color:var(--muted);margin-top:2px}
  .ap-box .s.green{color:var(--green);font-weight:600}
  .ap-box.wallet{min-height:84px;display:flex;align-items:center;padding:18px 22px}
  .applepay{font-size:26px;font-weight:600;display:flex;align-items:center}
  .applepay .g{font-size:30px;margin-right:2px}
  .mnote{display:none;font-size:14.5px;color:#333;line-height:1.6;padding-top:16px}
  .mnote.on{display:block}
  .mnote ul{margin:0 0 0 18px}
  .mnote li{margin-bottom:10px}
  .mnote b{font-weight:600}

  .mcontent{display:none;margin:12px 0 4px}
  .mcontent.on{display:block}
  .ap-lbl{font-size:15px;color:#333;margin:8px 0 8px}
  .field{width:100%;border:1px solid var(--line);border-radius:12px;padding:15px 16px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink);margin-bottom:12px}
  .field::placeholder{color:#86868b}
  .cc-wrap{position:relative}
  .cc-wrap .field{padding-right:60px}
  .cc-badge{position:absolute;right:14px;top:16px}
  .visa{font-weight:800;font-style:italic;color:#1a1f71;font-size:14px}
  .cardrow{display:grid;grid-template-columns:1fr 130px;gap:12px}
  .cvvwrap{display:flex;align-items:center;gap:10px}
  .cvvwrap .field{margin-bottom:0}
  .help-ic{width:24px;height:24px;border-radius:50%;background:#6e6e73;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  select.field{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%236e6e73' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:38px}
  .ap-link{display:inline-block;font-size:15px;margin:2px 0 6px}

  .ap-check{display:flex;gap:10px;font-size:15px;margin:6px 0 14px;align-items:flex-start}
  .field-wrap{position:relative;margin-bottom:12px}
  .field-wrap .flab{position:absolute;top:9px;left:16px;font-size:11px;color:var(--muted)}
  .field-wrap .field{margin-bottom:0}
  .field.flab-pad{padding-top:22px;padding-bottom:8px}
  .addrgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .addr-text{font-size:16px;line-height:1.62;color:var(--ink);white-space:pre-line;margin-bottom:4px}
  .ap-cpf{font-size:15px;font-weight:600;margin:6px 0}
  .ap-divider{border-top:1px solid var(--line);margin:26px 0}

  .apcta{background:var(--blue);color:#fff;border:0;border-radius:12px;padding:15px 34px;font-size:17px;font-weight:500;width:100%;max-width:540px}
  .apcta:hover{background:var(--blue-h)}
  .help-line{font-size:15px;color:#333;padding:26px 0;border-top:1px solid var(--line);margin-top:30px}
  .faq{border-top:1px solid var(--line)}
  .faq .q{display:flex;justify-content:space-between;align-items:center;padding:22px 0;cursor:pointer}
  .faq .q h3{font-size:24px;font-weight:600}
  .faq .q .chev{transition:transform .2s;color:#6e6e73}
  .faq.open .q .chev{transform:rotate(180deg)}
  .faq .a{display:none;padding:0 0 20px;font-size:14.5px;color:#333;line-height:1.7}
  .faq.open .a{display:block}
  footer.apf{background:var(--nav);padding:22px 0 34px;font-size:12px;color:var(--muted);line-height:1.7}
  footer.apf .wrap>div{margin-bottom:6px}
  footer.apf a{color:var(--muted);text-decoration:underline}
  .apf-legal{border-top:1px solid var(--line);padding-top:14px;margin-top:10px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

  .drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.32);opacity:0;pointer-events:none;transition:opacity .25s;z-index:90}
  .drawer-bg.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:430px;max-width:92%;background:#fff;box-shadow:-12px 0 44px rgba(0,0,0,.16);transform:translateX(100%);transition:transform .28s ease;z-index:91;padding:28px 30px 46px;overflow:auto}
  .drawer.show{transform:none}
  .drawer .x{position:absolute;top:20px;right:20px;width:34px;height:34px;border-radius:50%;background:#e8e8ed;border:0;font-size:15px;color:#333}
  .drawer h3{font-size:22px;font-weight:600;margin:2px 0 4px}
  .drawer h4{font-size:20px;font-weight:600;margin:26px 0 2px}
  .drawer .hr{border-top:1px solid var(--line);margin:16px 0}
  .drawer .row{display:flex;justify-content:space-between;font-size:15px;padding:6px 0;color:#333}
  .drawer .tot{display:flex;justify-content:space-between;font-size:18px;font-weight:600;padding-top:2px}
  .drawer .dvat{font-size:12px;color:var(--muted);text-align:right;margin-top:2px}
  .drawer .det{padding:14px 0;border-bottom:1px solid var(--line)}
  .drawer .det .h{display:flex;justify-content:space-between;font-weight:600;font-size:15px}
  .drawer .det .h a{font-weight:400}
  .drawer .det .v{font-size:15px;color:#333;margin-top:5px}

  .ov{position:fixed;inset:0;background:rgba(20,22,30,.5);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .ov.show{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:420px;width:92%;padding:34px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.35)}
  .spin{width:54px;height:54px;border:5px solid #e5e8f5;border-top-color:var(--blue);border-radius:50%;margin:6px auto 18px;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .m-t{font-size:20px;font-weight:600;margin-bottom:6px}
  .m-p{color:var(--muted);font-size:14px}
  .issuer{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;color:#1a1f71;margin-bottom:14px;font-size:15px}
  .otp{display:flex;gap:8px;justify-content:center;margin:18px 0}
  .otp input{width:42px;height:52px;text-align:center;font-size:22px;border:1px solid var(--line);border-radius:10px}
  .qr{width:170px;height:170px;margin:14px auto;border-radius:8px;background:repeating-conic-gradient(#111 0 25%,#fff 0 50%) 0 0/20px 20px}
  .count{font-weight:700;color:var(--blue);margin:6px 0}
  .success-ic{width:66px;height:66px;border-radius:50%;background:#e7f6ec;color:var(--green);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px}
  .m-btn{margin-top:20px;background:var(--blue);color:#fff;border:0;border-radius:999px;padding:14px 30px;font-weight:600;font-size:15px}

  .badge-y{display:inline-flex;align-items:center;gap:7px;background:#141726;color:#fff;border-radius:999px;padding:7px 14px;font-size:11px;font-weight:600;position:fixed;bottom:16px;right:16px;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:.92}
  .badge-y b{color:#8b93ff}
  @media (max-width:900px){.m-row{grid-template-columns:1fr;gap:2px}.mnote{padding-top:6px}}
  @media (max-width:560px){.addrgrid{grid-template-columns:1fr}.cardrow{grid-template-columns:1fr}.apnav .wrap{gap:16px;overflow-x:auto}}
</style>
</head>
<body>

<div class="ctabs"><div class="wrap">
  <span class="lbl">Demo · País</span>
  <button class="ctab on" data-c="BR" onclick="setCountry('BR')">🇧🇷 Brasil</button>
  <button class="ctab" data-c="MX" onclick="setCountry('MX')">🇲🇽 México</button>
</div></div>

<div id="app"></div>
<div class="badge-y">Demo · powered by <b>yuno</b></div>

<div class="ov" id="ov-proc"><div class="modal"><div class="spin"></div><div class="m-t" id="proc-t"></div><div class="m-p" id="proc-p"></div></div></div>
<div class="ov" id="ov-3ds"><div class="modal">
  <div class="issuer"><span class="visa">VISA</span> · <span id="d3-issuer"></span></div>
  <div class="m-t" id="d3-t"></div><div class="m-p" id="d3-p"></div>
  <div class="otp"><input maxlength="1" value="1"><input maxlength="1" value="2"><input maxlength="1" value="3"><input maxlength="1" value="4"><input maxlength="1" value="5"><input maxlength="1" value="6"></div>
  <button class="m-btn" id="d3-btn" onclick="finish3ds()"></button>
</div></div>
<div class="ov" id="ov-pix"><div class="modal">
  <div class="m-t" id="px-t"></div><div class="m-p" id="px-p"></div>
  <div class="qr"></div><div class="count" id="px-count">30:00</div>
  <button class="m-btn" id="px-btn" onclick="pixPaid()"></button>
</div></div>
<div class="ov" id="ov-ok"><div class="modal">
  <div class="success-ic">✓</div><div class="m-t" id="ok-t"></div><div class="m-p" id="ok-p"></div>
  <button class="m-btn" id="ok-btn" onclick="resetDemo()"></button>
</div></div>

<script>
const $=id=>document.getElementById(id);

const CFG={
 BR:{ lang:'pt', total:'R$ 11.499,00',
   sumLabel:'Mostrar resumo do pedido:', ivaNote:'Inclui os impostos aplicáveis.',
   issuer:'Autenticação do banco',
   nav:['Loja','Mac','iPad','iPhone','Watch','AirPods','TV e Casa','Entretenimento','Acessórios','Suporte'],
   methods:[
     {id:'CARD',    name:'Cartão de crédito', sub:'Visa, Mastercard, American Express', kind:'card'},
     {id:'APPLEPAY',name:'Apple Pay', kind:'wallet'},
     {id:'BOLETO',  name:'Boleto bancário', kind:'boleto', total:'R$ 10.349,10'},
     {id:'PIX',     name:'Pix', sub:'Aprovação em minutos', kind:'pix', green:true},
     {id:'NUPAY',   name:'NuPay', sub:'Pague com o app do Nubank', kind:'redirect'},
   ],
   notes:{
     APPLEPAY:'Complete the payment with Touch ID, Face ID, or your device passcode.',
     BOLETO:'<ul><li><b>Get 10% off</b> when paying in full with boleto bancário.</li><li>Once you place the order, you\'ll receive a boleto to complete the payment.</li><li>Payment processing can take up to three business days.</li></ul>',
     PIX:'With <b>Pix</b>, you pay by scanning the QR code or copying the code. <b>Approved in minutes.</b> The code is valid for 30 minutes.',
     NUPAY:'You\'ll be redirected to the <b>Nubank app (NuPay)</b> to authorize the payment.',
   },
   L:{ payQ:'Como você deseja pagar?', method:'Método de pagamento.',
       cardInfo:'Insira os dados do seu cartão:', ccnum:'Número do cartão de crédito', exp:'Validade MM/AA', cvv:'CVV',
       payopts:'Opções de pagamento:', payoptsPh:'Selecione o número de pagamentos',
       splitLink:'Dividir o pagamento usando outro cartão ⌄', splitNote:'To split the payment, both cards must have the same billing address.',
       revisar:'Revisar o pedido', helpLine:'Precisa de mais ajuda? <a href="#">Entre no chat</a> ou ligue para 0800-761-0867.',
       faqH:'Perguntas frequentes sobre pagamento',
       sub:'Subtotal', ship:'Frete', shipV:'GRÁTIS', total:'Seu total', item:'1 item', editBag:'Editar a sacola',
       details:'Detalhes do seu pedido', deliv:'Entrega em:', change:'Alterar', to:'Entregar para:', payL:'Pagamento', rev:'Revisão', see:'Ver',
       proc:'Processando o pagamento…', procS:'A Yuno está roteando para o melhor provedor.',

 MX:{ lang:'es', total:'$97,997.00',
   sumLabel:'Mostrar resumen de pedido:', ivaNote:'Incluye el IVA de $13,517.52',
   issuer:'Autenticación del banco',
   nav:['Tienda','Mac','iPad','iPhone','Watch','AirPods','TV y Casa','Entretenimiento','Accesorios','Soporte'],
   methods:[
     {id:'CARD',  name:'Tarjeta de crédito o débito', sub:'Visa, MasterCard, AMEX', kind:'card'},
     {id:'MP',    name:'Mercado Pago', sub:'Paga con tu cuenta o saldo', kind:'redirect'},
     {id:'OXXO',  name:'OXXO', sub:'Pago en efectivo', kind:'voucher'},
     {id:'SPEI',  name:'Transferencia bancaria (SPEI)', sub:'CLABE interbancaria', kind:'redirect'},
     {id:'KUESKI',name:'Kueski Pay', sub:'Paga después, en quincenas', kind:'redirect'},
   ],
   notes:{
     MP:'You\'ll be redirected to <b>Mercado Pago</b> to authorize the payment securely.',
     OXXO:'You\'ll receive a <b>barcode</b> to pay at any OXXO store. The order is confirmed once the payment is registered.',
     SPEI:'You\'ll receive a <b>CLABE</b> for a SPEI transfer. The order is confirmed once the transfer clears.',
     KUESKI:'You\'ll be redirected to <b>Kueski Pay</b> to <b>pay in installments</b> without a card.',
   },
   L:{ payQ:'¿Cómo quieres pagar?', method:'Método de pago.',
       cardInfo:'Ingresa tu información de tarjeta:', ccnum:'Número de tarjeta de crédito/débito', exp:'Vencimiento MM/AA', cvv:'CVV',
       payopts:'Opciones de pago:', payoptsPh:'Selecciona el número de pagos',
       splitLink:'', splitNote:'',
       revisar:'Revisar tu pedido', helpLine:'¿Necesitas más ayuda? <a href="#">Chatea ahora</a> o llama al 001-800-692-7753.',
       faqH:'Preguntas frecuentes de pago',
       sub:'Subtotal', ship:'Envíos', shipV:'GRATIS', total:'Tu total', item:'1 artículo', editBag:'Editar la bolsa',
       details:'Detalles de tu pedido', deliv:'Entrega en:', change:'Cambiar', to:'Entregar a:', payL:'Pago', rev:'Revisión', see:'Ver',
       proc:'Procesando el pago…', procS:'Yuno está enrutando al mejor proveedor.',
       d3:'Verificación 3DS', d3s:'Ingresa el código enviado por SMS por tu banco emisor.', d3b:'Confirmar',
       pxt:'', pxp:'', pxb:'',
       okt:'¡Gracias por tu compra!', okp:'Recibirás la confirmación de tu pedido por correo.', okb:'Seguir comprando' } },
};

let C='BR', apSelected='CARD', apCfg=null;

function setCountry(c){
  C=c; apSelected='CARD'; apCfg=CFG[c];
  document.querySelectorAll('.ctab').forEach(b=>b.classList.toggle('on',b.dataset.c===c));
  document.documentElement.lang = c==='BR'?'pt-BR':'es-MX';
  $('app').innerHTML = renderApple(CFG[c]);
}

function cardBody(cfg){
  const L=cfg.L;
  return `
    <div class="ap-lbl">${L.cardInfo}</div>
    <div class="cc-wrap"><input class="field" placeholder="${L.ccnum}"><span class="visa cc-badge">VISA</span></div>
    <div class="cardrow"><input class="field" placeholder="${L.exp}"><div class="cvvwrap"><input class="field" placeholder="${L.cvv}"><span class="help-ic">?</span></div></div>
    <div class="ap-lbl">${L.payopts}</div>
    <select class="field"><option>${L.payoptsPh}</option><option>${cfg.lang==='pt'?'1x '+cfg.total:'1 pago de '+cfg.total}</option><option>3x</option><option>6x</option><option>12x</option></select>
    ${L.splitLink?`<a class="ap-link" href="#">${L.splitLink}</a>`:''}`;
}
function methodBox(cfg,m){
  const sel=m.id===apSelected;
  const head = m.kind==='wallet'
    ? `<img src="apple-pay.png" alt="Apple Pay" style="height:52px;width:auto;display:block">`
    : `<div class="t">${m.name}</div>${m.sub?`<div class="s${m.green?' green':''}">${m.sub}</div>`:''}`;
  const leftBody = m.kind==='card' ? cardBody(cfg) : '';
  const note = m.kind==='card' ? (cfg.L.splitNote||'') : (cfg.notes[m.id]||'');
  return `
    <div class="m-row">
      <div class="m-left">
        <div class="ap-box ${m.kind==='wallet'?'wallet':''}${sel?' on':''}" data-m="${m.id}" onclick="pickAp('${m.id}')">${head}</div>
        ${leftBody?`<div class="mcontent${sel?' on':''}" id="mc-${m.id}">${leftBody}</div>`:''}
      </div>
      <div class="mnote${sel?' on':''}" id="note-${m.id}">${note}</div>
    </div>`;
}

function footerBR(){

  const L=cfg.L;
  return `
  <div class="apnav"><div class="wrap">

    ${cfg.nav.map(n=>`<a href="#">${n}</a>`).join('')}
    <span class="sp"></span><a href="#">⌕</a><a href="#">▢</a>
  </div></div>

    <h1 class="big">${L.payQ}</h1>

        :'<p><b>¿Qué métodos de pago aceptan?</b><br>Tarjeta de crédito o débito, y ahora también Mercado Pago, OXXO, SPEI y Kueski Pay.</p><p style="margin-top:10px"><b>¿Puedo pagar en mensualidades sin intereses (MSI)?</b><br>Sí, con tarjetas participantes eliges el número de pagos durante el checkout.</p>'}</div>
    </div>
  </div></div>
  ${cfg.lang==='pt'?footerBR():footerMX()}

  <div class="drawer-bg" id="drawerBg" onclick="closeSummary()"></div>
  <aside class="drawer" id="drawer">
    <button class="x" onclick="closeSummary()">✕</button>
    <h3>${cfg.lang==='pt'?'Total do seu pedido':'Total de tu pedido'}</h3>
    <div class="hr"></div>
    <div class="row"><span>${L.item}</span><a href="#">${L.editBag}</a></div>
    <div class="hr"></div>
    <div class="row"><span>${L.sub}</span><span id="drawerSub">${cfg.total}</span></div>
    <div class="row"><span>${L.ship}</span><span>${L.shipV}</span></div>
    <div class="hr"></div>
    <div class="tot"><span>${L.total}</span><span id="drawerTot">${cfg.total}</span></div>
    <div class="dvat">${cfg.ivaNote}</div>
    <h4>${L.details}</h4>
    <div class="det"><div class="h"><span>${L.deliv}</span><a href="#">${L.change}</a></div><div class="v">${cfg.lang==='pt'?'Seg 13 Jul':'Lun 13 Jul'}</div></div>

    <div class="det"><div class="h"><span>${L.payL}</span></div></div>

}

/* interactions */
function pickAp(id){
  apSelected=id;
  document.querySelectorAll('.ap-box[data-m]').forEach(el=>el.classList.toggle('on',el.dataset.m===id));
  document.querySelectorAll('.mcontent').forEach(el=>el.classList.toggle('on',el.id==='mc-'+id));
  document.querySelectorAll('.mnote').forEach(el=>el.classList.toggle('on',el.id==='note-'+id));
  const m=apCfg.methods.find(x=>x.id===id); const t=(m&&m.total)||apCfg.total;
  const link=$('sumLink'); if(link) link.textContent=apCfg.sumLabel+' '+t;
  ['drawerSub','drawerTot'].forEach(k=>{const e=$(k); if(e) e.textContent=t;});
}
function pickCfdi(el){ document.querySelectorAll('.checkout .ap-box:not([data-m])').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }
function toggleBRAddr(cb){ $('brAddrText').style.display=cb.checked?'block':'none'; $('brAddrForm').style.display=cb.checked?'none':'block'; }
function openSummary(){ $('drawer').classList.add('show'); $('drawerBg').classList.add('show'); }
function closeSummary(){ $('drawer').classList.remove('show'); $('drawerBg').classList.remove('show'); }

function show(id){$(id).classList.add('show')} function hide(id){$(id).classList.remove('show')}
function hideAll(){['ov-proc','ov-3ds','ov-pix','ov-ok'].forEach(hide)}
let pixTimer=null;
function pay(){
  const L=apCfg.L; const m=apCfg.methods.find(x=>x.id===apSelected);
  $('proc-t').textContent=L.proc; $('proc-p').textContent=L.procS; show('ov-proc');
  setTimeout(()=>{ hide('ov-proc');
    if(m.kind==='card'){ $('d3-issuer').textContent=apCfg.issuer; $('d3-t').textContent=L.d3; $('d3-p').textContent=L.d3s; $('d3-btn').textContent=L.d3b; show('ov-3ds'); }
    else if(m.kind==='pix'){ $('px-t').textContent=L.pxt; $('px-p').textContent=L.pxp; $('px-btn').textContent=L.pxb; pixCountdown(); show('ov-pix'); }
    else success();
  },1200);
}
function finish3ds(){ hide('ov-3ds'); const L=apCfg.L; $('proc-t').textContent=L.proc; $('proc-p').textContent='3DS ✓'; show('ov-proc'); setTimeout(()=>{hide('ov-proc');success();},900); }
function pixCountdown(){ let s=1800; clearInterval(pixTimer); pixTimer=setInterval(()=>{s--;$('px-count').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;if(s<=0)clearInterval(pixTimer);},1000); }
function pixPaid(){ clearInterval(pixTimer); hide('ov-pix'); success(); }
function success(){ const L=apCfg.L; $('ok-t').textContent=L.okt; $('ok-p').textContent=L.okp; $('ok-btn').textContent=L.okb; show('ov-ok'); }
function resetDemo(){ hideAll(); apSelected='CARD'; window.scrollTo({top:0,behavior:'smooth'}); }

setCountry('BR');
</script>
